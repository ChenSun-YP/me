<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redirecting…</title>
  <link rel="canonical" href="https://chensun-yp.github.io/" />
  <meta http-equiv="refresh" content="0;url=https://chensun-yp.github.io/" />
  <script>
    (function () {
      var path = location.pathname.replace(/^\/me\/?/, "/");
      if (!path || path === "") path = "/";
      location.replace("https://chensun-yp.github.io" + path + location.search + location.hash);
    })();
  </script>
</head>
<body>
  <p><a href="https://chensun-yp.github.io/">Continue to the site</a></p>
</body>
</html>
